<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hors ligne — CleanUx</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0e7ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            color: #1e293b;
        }
        .card {
            max-width: 480px;
            width: 100%;
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }
        .icon {
            width: 4rem;
            height: 4rem;
            margin: 0 auto 1rem;
            display: block;
            color: #2563eb;
        }
        h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
        p { color: #64748b; line-height: 1.5; margin-bottom: 1.5rem; }
        button {
            background: #2563eb; color: white; border: none;
            padding: 0.75rem 1.5rem; border-radius: 0.5rem;
            font-size: 0.875rem; font-weight: 600;
            cursor: pointer; transition: background 0.15s;
        }
        button:hover { background: #1d4ed8; }
        .status { margin-top: 1rem; font-size: 0.75rem; color: #94a3b8; }
        .status.online { color: #059669; }
    </style>
</head>
<body>
    <div class="card">
        <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.167a1 1 0 111.414 1.414m-1.414-1.414L3 3"/>
        </svg>
        <h1>Pas de connexion</h1>
        <p>
            Tu es actuellement hors ligne. Vérifie ta connexion internet et réessaie.
            <br><br>
            Certaines pages déjà visitées sont disponibles en mode offline.
        </p>
        <button onclick="window.location.reload()">Réessayer</button>
        <div id="status" class="status">Statut : hors ligne</div>
    </div>

    <script>
        function updateStatus() {
            const status = document.getElementById('status');
            if (navigator.onLine) {
                status.textContent = 'Statut : connecté ✓';
                status.classList.add('online');
                setTimeout(() => window.location.reload(), 1000);
            } else {
                status.textContent = 'Statut : hors ligne';
                status.classList.remove('online');
            }
        }

        window.addEventListener('online', updateStatus);
        window.addEventListener('offline', updateStatus);
        updateStatus();
    </script>
</body>
</html>
